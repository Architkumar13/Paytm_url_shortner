# Brings up the app and its Postgres database together.
#   docker compose up --build   ->  service on http://localhost:8080
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      BASE_URL: "http://localhost:8080"
      DATABASE_URL: "postgres://shortener:shortener@db:5432/shortener?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      CACHE_TTL: "24h"
      # ID_GENERATOR: "snowflake"   # uncomment to use the distributed generator
      # MACHINE_ID: "1"
    ports:
      - "8080:8080"

volumes:
  pgdata:
